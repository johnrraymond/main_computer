name: main-computer-gitea

services:
  # Machine-wide Git server shared by every Main Computer checkout/mode.
  #
  # This stack is intentionally standalone: applications, dev, debug, and safe
  # Compose stacks must not publish localhost:3000 themselves. Anyone can start
  # the shared Git server with:
  #
  #   docker compose -f docker-compose.gitea.yml up -d gitea
  gitea:
    image: gitea/gitea:${MAIN_COMPUTER_GITEA_IMAGE_TAG:-1.24}
    restart: unless-stopped
    environment:
      USER_UID: ${MAIN_COMPUTER_GITEA_UID:-1000}
      USER_GID: ${MAIN_COMPUTER_GITEA_GID:-1000}
      GITEA__database__DB_TYPE: sqlite3
      GITEA__server__DOMAIN: ${MAIN_COMPUTER_GITEA_DOMAIN:-localhost}
      GITEA__server__ROOT_URL: ${MAIN_COMPUTER_GITEA_ROOT_URL:-http://localhost:3000/}
      # Main Computer uses this local Gitea over HTTP only. Do not publish SSH:
      # the service is shared across checkouts, and host SSH ports collide easily.
      GITEA__server__DISABLE_SSH: "true"
      GITEA__server__START_SSH_SERVER: "false"
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__service__DISABLE_REGISTRATION: ${MAIN_COMPUTER_GITEA_DISABLE_REGISTRATION:-true}
      GITEA__repository__DEFAULT_BRANCH: ${MAIN_COMPUTER_GITEA_DEFAULT_BRANCH:-main}
    ports:
      - "127.0.0.1:${MAIN_COMPUTER_GITEA_HTTP_PORT:-3000}:3000"
    volumes:
      - gitea-data:/data

volumes:
  # Default preserves Gitea data from the former applications-stack service.
  # Override MAIN_COMPUTER_GITEA_DATA_VOLUME for a clean standalone store.
  gitea-data:
    name: ${MAIN_COMPUTER_GITEA_DATA_VOLUME:-main-computer-applications_gitea-data}

networks:
  default:
    name: ${MAIN_COMPUTER_GITEA_NETWORK_NAME:-main-computer-gitea}

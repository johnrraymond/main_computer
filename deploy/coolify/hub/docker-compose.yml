name: ${MAIN_COMPUTER_HUB_COMPOSE_PROJECT:-main-computer-hub}

services:
  hub:
    build:
      context: ../../..
      dockerfile: deploy/coolify/hub/Dockerfile
    image: ${MAIN_COMPUTER_HUB_IMAGE:-main-computer-hub:local}
    restart: unless-stopped
    command:
      - python
      - -m
      - main_computer.cli
      - hub
      - --host
      - 0.0.0.0
      - --port
      - "8770"
      - --hub-root
      - /runtime/hub
      - -noverbose
    environment:
      # Container facts only. Core hub defaults come from main_computer/config.py.
      MAIN_COMPUTER_WORKSPACE: /workspace
      MAIN_COMPUTER_HUB_ROOT: /runtime/hub
    volumes:
      - hub-runtime:/runtime/hub
    ports:
      - "${MAIN_COMPUTER_HUB_PORT:-8770}:8770"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8770/api/hub/v1/health', timeout=5).read()"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  hub-runtime:

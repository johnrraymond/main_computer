<div class="file-explorer-app" id="file-explorer-app" aria-label="File Explorer">
            <div class="file-explorer-shell app-widget" data-widget-label="File Explorer">
              <aside class="file-explorer-roots-panel">
                <div>
                  <strong>File Explorer</strong>
                  <span>Read-only system browsing for files and Main Computer assets.</span>
                </div>
                <div class="file-explorer-status" id="file-explorer-status">file explorer ready</div>
                <div class="file-explorer-roots" id="file-explorer-roots" aria-label="File explorer roots"></div>
              </aside>
              <section class="file-explorer-main">
                <div class="file-explorer-toolbar">
                  <div class="file-explorer-path" id="file-explorer-path">/</div>
                  <input id="file-explorer-search" placeholder="Search current folder" aria-label="Search current folder">
                  <button type="button" id="file-explorer-search-run">Search</button>
                  <button type="button" id="file-explorer-up">Up</button>
                </div>
                <div class="file-explorer-list file-explorer-wunderbaum wb-skeleton" id="file-explorer-list" data-file-explorer-tree aria-label="Directory listing"></div>
              </section>
              <aside class="file-explorer-preview" id="file-explorer-preview" aria-label="File preview">
                Select a file or folder to preview metadata.
              </aside>
            </div>
          </div>

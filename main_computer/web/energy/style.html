  <style>
    :root {
      color-scheme: dark;
      --ink: #f7f3e8;
      --muted: #c9c0aa;
      --dim: #8f846d;
      --line: rgba(246, 199, 91, 0.2);
      --line-strong: rgba(246, 199, 91, 0.42);
      --gold: #f6c75b;
      --gold-2: #ffe7a3;
      --coral: #ff8f70;
      --red: #ff6262;
      --sky: #73d6ff;
      --mint: #a7d86d;
      --violet: #b49cff;
      --shell: #070806;
      --panel: rgba(17, 18, 15, 0.82);
      --panel-strong: rgba(28, 25, 18, 0.92);
      --glass: rgba(255, 255, 255, 0.055);
      --shadow: 0 20px 80px rgba(0, 0, 0, 0.55);
      --radius: 22px;
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; margin: 0; }
    body {
      background:
        radial-gradient(circle at 18% 8%, rgba(246, 199, 91, 0.24), transparent 28rem),
        radial-gradient(circle at 85% 12%, rgba(115, 214, 255, 0.16), transparent 24rem),
        radial-gradient(circle at 68% 76%, rgba(167, 216, 109, 0.1), transparent 28rem),
        linear-gradient(135deg, #060704 0%, #0c0b07 45%, #050605 100%);
      color: var(--ink);
      font-family: "Segoe UI", Arial, sans-serif;
      letter-spacing: 0;
    }
    .viewport {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    .energy-topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      padding: 16px 22px;
      border-bottom: 1px solid var(--line);
      background: rgba(7, 8, 6, 0.86);
      backdrop-filter: blur(18px);
    }
    h1, h2, h3, p { margin-top: 0; }
    h1 { margin-bottom: 0; font-size: clamp(21px, 2vw, 30px); letter-spacing: -0.03em; }
    h2 { margin: 0 0 10px; color: var(--gold-2); font-size: clamp(28px, 4.2vw, 58px); line-height: 0.98; letter-spacing: -0.06em; }
    h3 { margin: 0; font-size: 18px; letter-spacing: -0.02em; }
    .eyebrow {
      margin: 0 0 6px;
      color: var(--gold);
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.16em;
    }
    nav { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    a, button {
      border: 0;
      border-radius: 999px;
      padding: 10px 13px;
      color: #120d05;
      background: var(--gold);
      font: inherit;
      font-weight: 900;
      text-decoration: none;
      cursor: pointer;
    }
    a:hover, button:hover { filter: brightness(1.06); }
    button:disabled { cursor: not-allowed; opacity: 0.6; }
    .energy-workbench {
      min-height: 0;
      display: grid;
      gap: 16px;
      padding: 16px;
    }

    .energy-command-center {
      display: grid;
      gap: 14px;
      border: 1px solid var(--line-strong);
      border-radius: 30px;
      padding: clamp(16px, 2vw, 26px);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.025)),
        rgba(12, 12, 8, 0.86);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .energy-hero {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(320px, 0.65fr);
      gap: 18px;
      align-items: stretch;
    }
    .energy-hero-copy {
      min-height: 230px;
      display: grid;
      align-content: end;
      padding: clamp(18px, 3vw, 38px);
      border-radius: 26px;
      background:
        linear-gradient(135deg, rgba(246, 199, 91, 0.20), transparent 62%),
        linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.025));
      border: 1px solid var(--line);
    }
    .energy-hero-copy p:last-child {
      max-width: 760px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.55;
      margin-bottom: 0;
    }
    .energy-hero-status {
      display: grid;
      gap: 12px;
    }
    .hero-stat {
      display: grid;
      align-content: center;
      min-height: 84px;
      padding: 16px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.075);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .hero-stat span { color: var(--dim); font-size: 12px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.12em; }
    .hero-stat strong { color: var(--ink); font-size: 24px; letter-spacing: -0.04em; }

    .energy-network-ribbon {
      display: grid;
      grid-template-columns: repeat(4, minmax(160px, 1fr));
      gap: 10px;
    }
    .network-card {
      display: grid;
      gap: 6px;
      justify-items: start;
      min-height: 118px;
      padding: 16px;
      border-radius: 20px;
      border: 1px solid var(--line);
      background: var(--glass);
      color: var(--ink);
      text-align: left;
    }
    .network-card.primary {
      background:
        linear-gradient(135deg, rgba(246, 199, 91, 0.26), rgba(255, 255, 255, 0.055));
      border-color: var(--line-strong);
    }
    .network-card[aria-pressed="true"] {
      outline: 2px solid var(--gold);
      outline-offset: 2px;
    }
    .network-card span { color: var(--muted); font-size: 12px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.14em; }
    .network-card strong { font-size: 24px; letter-spacing: -0.04em; }
    .network-card small { color: var(--dim); overflow-wrap: anywhere; }
    .network-card[data-state="healthy"] strong, .status-pill[data-state="healthy"] { color: var(--mint); }
    .network-card[data-state="degraded"] strong, .status-pill[data-state="degraded"] { color: var(--gold); }
    .network-card[data-state="unsafe"] strong, .status-pill[data-state="unsafe"] { color: var(--red); }

    .energy-monitor-grid {
      display: grid;
      grid-template-columns: minmax(280px, 0.95fr) minmax(320px, 1.2fr);
      gap: 12px;
    }
    .monitor-panel,
    section,
    aside {
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      padding: 16px;
      overflow: auto;
    }
    .monitor-panel {
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.072), rgba(255, 255, 255, 0.03));
      box-shadow: 0 10px 36px rgba(0, 0, 0, 0.22);
    }
    .panel-title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .status-pill,
    .panel-title-row > span {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.09em;
    }
    .network-facts {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin: 0;
    }
    .network-facts div,
    .contract-item,
    .office-item,
    #energy-network-warnings li {
      padding: 12px;
      border-radius: 16px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.07);
    }
    .network-facts dt {
      color: var(--dim);
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }
    .network-facts dd {
      margin: 4px 0 0;
      color: var(--ink);
      font-weight: 800;
      overflow-wrap: anywhere;
    }
    .contract-list,
    .office-list {
      display: grid;
      gap: 9px;
    }
    .contract-item,
    .office-item {
      display: grid;
      gap: 4px;
    }
    .contract-item strong,
    .office-item strong { color: var(--gold-2); }
    .contract-item code,
    .office-item code {
      color: var(--sky);
      font-size: 12px;
      white-space: normal;
      overflow-wrap: anywhere;
    }
    .contract-item[data-code="true"] { border-color: rgba(167, 216, 109, 0.32); }
    .contract-item[data-code="false"],
    .office-item[data-default-anvil="true"] { border-color: rgba(255, 98, 98, 0.48); }
    #energy-network-warnings {
      display: grid;
      gap: 9px;
      margin: 0;
      padding: 0;
      list-style: none;
    }
    #energy-network-warnings li { color: var(--muted); }
    #energy-network-warnings li.unsafe { color: var(--red); border-color: rgba(255, 98, 98, 0.45); }
    #energy-network-warnings li.ok { color: var(--mint); border-color: rgba(167, 216, 109, 0.32); }

    .energy-operations-grid {
      display: grid;
      grid-template-columns: 340px minmax(0, 1fr) 360px;
      gap: 12px;
      padding: 0;
      border: 0;
      background: transparent;
      overflow: visible;
    }
    .energy-operations-grid > section,
    .energy-operations-grid > aside {
      max-height: 74vh;
    }
    .metric {
      min-height: 72px;
      display: grid;
      align-content: center;
      margin-bottom: 10px;
      padding: 12px;
      border-radius: 16px;
      color: #120d05;
      background: var(--gold);
      font-weight: 900;
    }
    .metric:nth-child(2) { background: var(--sky); }
    .metric:nth-child(3) { background: var(--mint); }
    .chain-panel {
      margin: 12px 0;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.04);
    }
    .energy-raw-disclosure {
      margin: 12px 0 0;
      border: 1px solid rgba(246, 199, 91, 0.2);
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.24);
      overflow: hidden;
    }
    .energy-raw-disclosure > summary {
      cursor: pointer;
      padding: 10px 12px;
      color: var(--gold-2);
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      list-style-position: inside;
      user-select: none;
    }
    .energy-raw-disclosure > summary:hover,
    .energy-raw-disclosure[open] > summary {
      background: rgba(246, 199, 91, 0.08);
    }
    .energy-raw-disclosure > pre {
      max-height: 46vh;
      margin: 0;
      padding: 12px;
      overflow: auto;
      border-top: 1px solid rgba(246, 199, 91, 0.14);
      background: rgba(0, 0, 0, 0.32);
    }
    .chain-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .chain-grid div {
      display: grid;
      gap: 4px;
      padding: 10px;
      border-radius: 12px;
      background: rgba(0,0,0,0.2);
    }
    .chain-grid strong,
    label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }
    .chain-grid span { color: var(--ink); font-weight: 800; overflow-wrap: anywhere; text-transform: none; letter-spacing: 0; }
    label { margin: 10px 0; }
    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      background: #050604;
      color: var(--ink);
      font: inherit;
    }
    textarea { min-height: 72px; resize: vertical; }
    pre, code {
      color: var(--sky);
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    #nodes, #transactions {
      display: grid;
      gap: 8px;
    }
    #nodes > div,
    #transactions > div {
      padding: 10px;
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .button-row, .actions, .xlag-button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 10px 0;
    }
    .danger, button.danger { background: var(--coral); }
    .secondary, button.secondary { background: #d5c7a5; }
    .ok { color: var(--mint); }
    .warn { color: var(--gold); }
    .bad { color: var(--red); }

    @media (max-width: 1180px) {
      .energy-hero,
      .energy-monitor-grid,
      .energy-operations-grid {
        grid-template-columns: 1fr;
      }
      .energy-network-ribbon {
        grid-template-columns: repeat(2, minmax(160px, 1fr));
      }
      .energy-operations-grid > section,
      .energy-operations-grid > aside {
        max-height: none;
      }
    }
    @media (max-width: 720px) {
      .energy-topbar,
      .panel-title-row {
        display: grid;
        justify-content: stretch;
      }
      .energy-workbench { padding: 10px; }
      .energy-command-center { border-radius: 22px; padding: 12px; }
      .energy-network-ribbon,
      .network-facts {
        grid-template-columns: 1fr;
      }
      a, button { width: 100%; justify-content: center; text-align: center; }
    }
  </style>

name: main-computer-astrometric

services:
  astrometric-renderer:
    build:
      context: ./docker/astrometric-renderer
    image: main-computer/astrometric-renderer:local
    container_name: main-computer-astrometric-renderer
    restart: "no"
    ports:
      - "${ASTROMETRIC_RENDERER_HOST_BIND:-127.0.0.1}:${ASTROMETRIC_RENDERER_PORT:-8794}:8794"
    environment:
      ASTROMETRIC_RENDERER_BIND: "0.0.0.0"
      ASTROMETRIC_RENDERER_PORT: "8794"
      ASTROMETRIC_RENDERER_WIDTH: "${ASTROMETRIC_RENDERER_WIDTH:-640}"
      ASTROMETRIC_RENDERER_HEIGHT: "${ASTROMETRIC_RENDERER_HEIGHT:-360}"
      ASTROMETRIC_RENDERER_FPS: "${ASTROMETRIC_RENDERER_FPS:-10}"
      ASTROMETRIC_RENDERER_JPEG_QUALITY: "${ASTROMETRIC_RENDERER_JPEG_QUALITY:-86}"
      ASTROMETRIC_RENDERER_MODE: "${ASTROMETRIC_RENDERER_MODE:-gpu}"
      ASTROMETRIC_RENDERER_BACKEND: "${ASTROMETRIC_RENDERER_BACKEND:-cuda}"
      ASTROMETRIC_RENDERER_IDLE_STEPS: "${ASTROMETRIC_RENDERER_IDLE_STEPS:-1900}"
      ASTROMETRIC_RENDERER_MOVING_STEPS: "${ASTROMETRIC_RENDERER_MOVING_STEPS:-800}"
      ASTROMETRIC_RENDERER_IDLE_STEP_LENGTH: "${ASTROMETRIC_RENDERER_IDLE_STEP_LENGTH:-1.5e8}"
      ASTROMETRIC_RENDERER_MOVING_STEP_LENGTH: "${ASTROMETRIC_RENDERER_MOVING_STEP_LENGTH:-1.8e8}"
      NVIDIA_VISIBLE_DEVICES: "${NVIDIA_VISIBLE_DEVICES:-all}"
      NVIDIA_DRIVER_CAPABILITIES: "${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}"
      CUDA_CACHE_PATH: "/tmp/nv/ComputeCache"
    gpus: all
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8794/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 20s

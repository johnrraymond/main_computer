services:
  astrometric-renderer:
    build:
      context: ./docker/astrometric-renderer
    image: main-computer/astrometric-renderer:local
    container_name: main-computer-astrometric-renderer
    restart: unless-stopped
    ports:
      - "127.0.0.1:${ASTROMETRIC_RENDERER_PORT:-8794}:8794"
    environment:
      ASTROMETRIC_RENDERER_BIND: "0.0.0.0"
      ASTROMETRIC_RENDERER_PORT: "8794"
      ASTROMETRIC_RENDERER_WIDTH: "${ASTROMETRIC_RENDERER_WIDTH:-800}"
      ASTROMETRIC_RENDERER_HEIGHT: "${ASTROMETRIC_RENDERER_HEIGHT:-450}"
      ASTROMETRIC_RENDERER_FPS: "${ASTROMETRIC_RENDERER_FPS:-12}"
      ASTROMETRIC_RENDERER_JPEG_QUALITY: "${ASTROMETRIC_RENDERER_JPEG_QUALITY:-86}"
      ASTROMETRIC_RENDERER_IDLE_STEPS: "${ASTROMETRIC_RENDERER_IDLE_STEPS:-960}"
      ASTROMETRIC_RENDERER_MOVING_STEPS: "${ASTROMETRIC_RENDERER_MOVING_STEPS:-520}"
      ASTROMETRIC_RENDERER_IDLE_STEP_LENGTH: "${ASTROMETRIC_RENDERER_IDLE_STEP_LENGTH:-3.4e7}"
      ASTROMETRIC_RENDERER_MOVING_STEP_LENGTH: "${ASTROMETRIC_RENDERER_MOVING_STEP_LENGTH:-5.4e7}"
      NVIDIA_VISIBLE_DEVICES: "${NVIDIA_VISIBLE_DEVICES:-all}"
      NVIDIA_DRIVER_CAPABILITIES: "${NVIDIA_DRIVER_CAPABILITIES:-graphics,compute,utility}"
    gpus: all
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8794/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 20s

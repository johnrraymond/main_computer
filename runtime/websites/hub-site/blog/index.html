<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blog - Hub Site</title>
  <link rel="stylesheet" href="/style.css">
  <script src="/script.js" defer></script>
</head>
<body data-mc-generated-blog-page="list_and_detail" data-mc-blog-route-mode="index">
  <!-- Main Computer generated blog page: list_and_detail -->
  <main>
    <section class="mc-section mc-blog-widget"
             data-mc-widget="blog-list"
             data-source-ref="blog.posts"
             data-limit="12"
             data-post-base-path="/blog/">
      <div class="mc-blog-widget__header">
        <div>
          <p class="mc-eyebrow">Latest posts</p>
          <h1>From the blog</h1>
        </div>
      </div>
      <div class="mc-blog-widget__items" data-mc-blog-posts>
        <article class="mc-blog-widget__placeholder">
          Blog posts will appear here when Blog is configured.
        </article>
      </div>
    </section>

    <section class="mc-section mc-blog-post-widget"
             data-mc-widget="blog-post-viewer"
             data-source-ref="blog.posts"
             data-route-prefix="/blog/">
      <a class="mc-blog-post-widget__back" href="/blog">← Back to blog</a>
      <div data-mc-blog-post-viewer>
        Open this page at /blog/&lt;slug&gt; to show a published post.
      </div>
    </section>
  </main>
</body>
</html>

name: main-computer-onlyoffice

services:
  onlyoffice:
    image: onlyoffice/documentserver:${MAIN_COMPUTER_ONLYOFFICE_IMAGE_TAG:-latest}
    container_name: ${MAIN_COMPUTER_ONLYOFFICE_CONTAINER_NAME:-main-computer-onlyoffice-documentserver}
    restart: unless-stopped
    environment:
      JWT_ENABLED: ${MAIN_COMPUTER_ONLYOFFICE_JWT_ENABLED:-false}
      JWT_SECRET: ${MAIN_COMPUTER_ONLYOFFICE_JWT_SECRET:-}
      ALLOW_PRIVATE_IP_ADDRESS: ${MAIN_COMPUTER_ONLYOFFICE_ALLOW_PRIVATE_IP_ADDRESS:-true}
      ALLOW_META_IP_ADDRESS: ${MAIN_COMPUTER_ONLYOFFICE_ALLOW_META_IP_ADDRESS:-true}
    ports:
      # Local platform site publishing owns 18080-18083; ONLYOFFICE Docker uses 18085.
      - "127.0.0.1:${MAIN_COMPUTER_ONLYOFFICE_PORT:-18085}:80"
    volumes:
      - onlyoffice-data:/var/www/onlyoffice/Data
      - onlyoffice-logs:/var/log/onlyoffice
      - onlyoffice-lib:/var/lib/onlyoffice
      - onlyoffice-db:/var/lib/postgresql

volumes:
  onlyoffice-data:
  onlyoffice-logs:
  onlyoffice-lib:
  onlyoffice-db:
